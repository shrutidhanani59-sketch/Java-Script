        //  2. Check if a number is Perfect using function. 
        function isPerfect(num) {
            let sum = 0;

            for (let i = 1; i < num; i++) {
                if (num % i === 0) {
                    sum += i;
                }
            }

            return sum === num;
        }

        let n = Number(prompt("Enter a Number"));

        if (isPerfect(n)) {
            alert("Perfect Number")
        } else {
            alert("Not Perfect Number")
        }
    </script>
