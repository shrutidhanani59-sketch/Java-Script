<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = [ 'John', 'Jane', 'Doe' ];
        console.log(arr);
        console.log(" ");
        
        
        console.log("Push");

        arr.push('smith')
        console.log(arr);
        console.log(" ");
        
        
        console.log("pop");

        arr.pop()
        console.log(arr);
        console.log(" ");
        
        console.log("unshift");

        arr.unshift('Alice')
        console.log(arr);
        console.log(" ");

        console.log("shift");

        arr.shift()
        console.log(arr);
        console.log(" ");
        
        
        
    </script>
</body>
</html>
